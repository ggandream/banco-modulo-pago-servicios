# =============================================================================
# SonarQube Configuration
# =============================================================================
# Run locally: docker run --rm -v "$(pwd):/usr/src" sonarsource/sonar-scanner-cli
#   -Dsonar.host.url=http://localhost:9000
#   -Dsonar.login=<your-token>

sonar.projectKey=banco-pago-servicios
sonar.projectName=Banco - Modulo Pago de Servicios
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=backend/src,frontend/src

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/generated/**,**/*.spec.ts,**/*.test.ts,**/coverage/**

# TypeScript/JavaScript
sonar.typescript.lcov.reportPaths=backend/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
