services:

  # ===========================================================================
  # PostgreSQL Database
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
      POSTGRES_DB: ${POSTGRES_DB:-mydb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-root} -d ${POSTGRES_DB:-mydb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - banco-network

  # ===========================================================================
  # pgAdmin (optional - database management UI)
  # ===========================================================================
  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - banco-network

  # ===========================================================================
  # Backend API (NestJS + Prisma)
  # ===========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-root}:${POSTGRES_PASSWORD:-root}@postgres:5432/${POSTGRES_DB:-mydb}?schema=public
      JWT_SECRET: ${JWT_SECRET:-banco_modulo_secret_2026}
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      RUN_SEED: ${RUN_SEED:-false}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - banco-network

  # ===========================================================================
  # Frontend (React + Vite served by Nginx)
  # ===========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - banco-network

# =============================================================================
# Volumes - Data persistence
# =============================================================================
volumes:
  postgres_data:
    driver: local

# =============================================================================
# Networks - Internal communication
# =============================================================================
networks:
  banco-network:
    driver: bridge
