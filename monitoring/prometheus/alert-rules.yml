groups:
  - name: banco-alerts
    rules:
      # -----------------------------------------------------------------------
      # High error rate (> 5% in 5 minutes)
      # -----------------------------------------------------------------------
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_errors_total[5m]))
            /
            sum(rate(http_requests_total[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP error rate detected"
          description: "Error rate is above 5% for the last 5 minutes (current: {{ $value | humanizePercentage }})"

      # -----------------------------------------------------------------------
      # Backend down
      # -----------------------------------------------------------------------
      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend is down"
          description: "The NestJS backend has been unreachable for more than 1 minute"

      # -----------------------------------------------------------------------
      # Slow payment processing (> 5 seconds p95)
      # -----------------------------------------------------------------------
      - alert: SlowPayments
        expr: histogram_quantile(0.95, rate(payment_processing_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Payment processing is slow"
          description: "95th percentile of payment processing time is above 5 seconds"
